<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>happly — Admin Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Lora:ital,wght@0,600;1,400&display=swap');
  :root {
    --pink:#CC0066; --pink-d:#99004D; --pink-l:#FFF0F7; --pink-m:#FFD6EC;
    --ok:#1E7B55; --ok-l:#E0F4EC; --warn:#B45309; --warn-l:#FEF3C7;
    --plum:#2D1B36; --bg:#F7F2F5; --surface:#FFFFFF; --border:#ECD8E4;
    --text:#1A0A12; --text-mid:#5E3A4E; --text-soft:#A87A94; --r:12px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}

  /* Sidebar */
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--surface);
    border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
  .sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);
    display:flex;flex-direction:column;gap:3px}
  .sidebar-logo img{height:22px}
  .sidebar-logo .product-line{font-size:10px;font-weight:600;letter-spacing:.6px;
    text-transform:uppercase;color:var(--text-soft)}
  .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
  .nav-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
    color:var(--text-soft);padding:14px 20px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:14px;
    color:var(--text-mid);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover{background:var(--pink-l);color:var(--pink)}
  .nav-item.active{background:var(--pink-l);color:var(--pink);font-weight:600}
  .nav-item .ico{font-size:16px;width:20px;text-align:center}
  .nav-divider{height:1px;background:var(--border);margin:8px 0}

  /* Main */
  .main{margin-left:240px;padding:32px;min-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .page-title{font-family:'Lora',serif;font-size:26px;font-weight:600}
  .page-title span{color:var(--pink);font-style:italic}

  /* Login */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
  .login-card{background:var(--surface);border-radius:20px;padding:40px;width:360px;
    box-shadow:0 8px 40px rgba(204,0,102,.12);text-align:center}
  .login-card img{height:28px;margin-bottom:6px}
  .login-card .login-sub{font-size:11px;color:var(--text-soft);letter-spacing:.5px;
    text-transform:uppercase;margin-bottom:18px}
  .login-card h2{font-family:'Lora',serif;font-size:20px;margin-bottom:18px}
  .login-input{width:100%;border:2px solid var(--border);border-radius:10px;padding:13px 15px;
    font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);margin-bottom:12px;transition:border-color .2s}
  .login-input:focus{outline:none;border-color:var(--pink)}
  .login-btn{width:100%;background:var(--pink);color:#fff;border:none;border-radius:10px;
    padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;
    box-shadow:0 6px 20px rgba(204,0,102,.28);transition:transform .12s}
  .login-btn:hover{transform:translateY(-1px)}
  .login-error{color:#C13A3A;font-size:13px;margin-top:8px;display:none}

  /* Cards & KPI */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
  .card-title{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:14px}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
  .kpi-card.highlight{background:var(--pink);border-color:var(--pink)}
  .kpi-label{font-size:12px;color:var(--text-soft);margin-bottom:6px;font-weight:500}
  .kpi-card.highlight .kpi-label{color:rgba(255,255,255,.75)}
  .kpi-value{font-size:32px;font-weight:600;color:var(--text);line-height:1}
  .kpi-card.highlight .kpi-value{color:#fff}
  .kpi-sub{font-size:12px;color:var(--text-soft);margin-top:4px}
  .kpi-card.highlight .kpi-sub{color:rgba(255,255,255,.6)}

  /* Charts */
  .charts-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:24px}
  .chart-wrap{position:relative;height:220px}

  /* Blockers */
  .blocker-list{display:flex;flex-direction:column;gap:8px}
  .blocker-item{display:flex;align-items:center;gap:10px}
  .blocker-label{font-size:13px;color:var(--text-mid);min-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .blocker-bar-wrap{flex:1;background:#F3E8EF;border-radius:100px;height:8px;overflow:hidden}
  .blocker-bar{height:100%;background:var(--pink);border-radius:100px;transition:width .5s}
  .blocker-count{font-size:12px;color:var(--text-soft);min-width:28px;text-align:right}

  /* Table */
  .tenant-table{width:100%;border-collapse:collapse}
  .tenant-table th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
    color:var(--text-soft);padding:0 14px 10px;border-bottom:1px solid var(--border)}
  .tenant-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
  .tenant-table tr:last-child td{border-bottom:none}
  .tenant-table tr:hover td{background:#FDF8FB}
  .tenant-name{font-weight:600;color:var(--text)}
  .tenant-slug{font-size:12px;color:var(--text-soft);margin-top:2px}

  /* Product pills in table */
  .product-pills{display:flex;gap:4px;flex-wrap:wrap}
  .product-pill{background:var(--pink-l);color:var(--pink);border-radius:100px;
    padding:2px 9px;font-size:11px;font-weight:600}

  .badge-active{background:var(--ok-l);color:var(--ok);border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600}
  .badge-inactive{background:#F3E8EF;color:var(--text-soft);border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600}
  .btn-detail{background:var(--pink-l);color:var(--pink);border:1px solid var(--pink-m);
    border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-detail:hover{background:var(--pink-m)}

  /* Product tabs */
  .tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--border);
    border-radius:10px;padding:3px;width:fit-content}
  .tab{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:500;
    cursor:pointer;color:var(--text-mid);transition:all .15s;border:none;background:none}
  .tab.active{background:#fff;color:var(--pink);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}

  /* Feedback legend */
  .fb-legend{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .fb-legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mid)}
  .fb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  /* Form */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .form-field{display:flex;flex-direction:column;gap:5px}
  .form-label{font-size:12px;font-weight:600;color:var(--text-mid)}
  .form-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;
    font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);transition:border-color .2s}
  .form-input:focus{outline:none;border-color:var(--pink)}
  .product-checkboxes{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .product-cb{display:flex;align-items:center;gap:6px;background:var(--pink-l);
    border:1.5px solid var(--pink-m);border-radius:100px;padding:6px 14px;cursor:pointer;
    font-size:13px;color:var(--pink);font-weight:500;transition:all .15s;user-select:none}
  .product-cb input{display:none}
  .product-cb.checked{background:var(--pink);color:#fff;border-color:var(--pink)}
  .btn-create{background:var(--pink);color:#fff;border:none;border-radius:10px;
    padding:12px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
    cursor:pointer;transition:transform .12s;box-shadow:0 4px 16px rgba(204,0,102,.25)}
  .btn-create:hover{transform:translateY(-1px)}
  .links-section{margin-top:16px;display:none}
  .links-product-title{font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.4px}
  .links-box{background:#F7F2F5;border:1.5px solid var(--border);border-radius:10px;
    padding:14px;font-family:monospace;font-size:12px;color:var(--text-mid);
    max-height:160px;overflow-y:auto;line-height:1.8;white-space:pre-wrap;
    word-break:break-all;margin-bottom:8px}
  .copy-btn{background:var(--ok);color:#fff;border:none;border-radius:8px;
    padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:14px}

  /* PDF btn */
  .pdf-btn{background:var(--plum);color:white;border:none;border-radius:10px;
    padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
    cursor:pointer;transition:opacity .15s;white-space:nowrap}
  .pdf-btn:hover{opacity:.85}
  .pdf-btn:disabled{opacity:.5;cursor:default}

  /* Misc */
  .loading{color:var(--text-soft);font-size:14px;padding:20px;text-align:center}
  .empty{color:var(--text-soft);font-size:14px;padding:32px;text-align:center;font-style:italic}
  .back-link{background:none;border:none;color:var(--pink);font-size:14px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:16px}
  .back-link:hover{text-decoration:underline}
</style>
</head>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
let ADMIN_KEY = '';
let charts = {};
let currentTenantSlug = '';
let currentProductSlug = 'zetjes';
let allProducts = [];

async function doLogin() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  try {
    const r = await fetch(API+'/api/dashboard/stats', {headers:{'x-admin-key':key}});
    if (r.status === 401) { document.getElementById('login-error').style.display='block'; return; }
    ADMIN_KEY = key;
    const d = await r.json();
    allProducts = d.products || [];
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    renderProductCheckboxes();
    loadOverview();
  } catch(e) {
    document.getElementById('login-error').textContent='Verbinding mislukt';
    document.getElementById('login-error').style.display='block';
  }
}

function logout() {
  ADMIN_KEY='';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('admin-key-input').value='';
}

function showView(view) {
  ['overview','tenants','tenant-detail','new-tenant'].forEach(v=>{
    document.getElementById('view-'+v).style.display='none';
  });
  ['overview','tenants','new-tenant'].forEach(v=>{
    document.getElementById('nav-'+v)?.classList.remove('active');
  });
  document.getElementById('view-'+view).style.display='block';
  document.getElementById('nav-'+view)?.classList.add('active');
  if (view==='overview') loadOverview();
  if (view==='tenants') loadTenants();
}

async function api(path) {
  const r = await fetch(API+path, {headers:{'x-admin-key':ADMIN_KEY}});
  return r.json();
}

// ── Overzicht ──
async function loadOverview() {
  const el = document.getElementById('overview-content');
  el.innerHTML='<div class="loading">Laden...</div>';
  const d = await api('/api/dashboard/stats');
  const tenants = d.tenants || [];

  const totalSessions = tenants.reduce((s,t)=>s+t.total_sessions,0);
  const totalUsers    = tenants.reduce((s,t)=>s+t.unique_users,0);
  const activeTenants = tenants.filter(t=>t.active).length;

  // Globale effectiviteitsscore over alle sessies
  let ja=0, beetje=0, nee=0;
  tenants.forEach(t => (t.products||[]).forEach(p => {
    ja+=p.feedback?.ja||0; beetje+=p.feedback?.beetje||0; nee+=p.feedback?.nee||0;
  }));
  const withFb=ja+beetje+nee;
  const eff = withFb>0 ? Math.round(((ja+beetje*.5)/withFb)*100)+'%' : '–';

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card highlight">
        <div class="kpi-label">Effectiviteitsscore</div>
        <div class="kpi-value">${eff}</div>
        <div class="kpi-sub">Alle producten · Alle klanten</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Totaal sessies</div>
        <div class="kpi-value">${totalSessions}</div>
        <div class="kpi-sub">Alle producten</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Unieke gebruikers</div>
        <div class="kpi-value">${totalUsers}</div>
        <div class="kpi-sub">Actieve medewerkers</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Actieve klanten</div>
        <div class="kpi-value">${activeTenants}</div>
        <div class="kpi-sub">van ${tenants.length} totaal</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Klanten — snel overzicht</div>
      <table class="tenant-table">
        <thead><tr>
          <th>Klant</th><th>Producten</th><th>Sessies</th>
          <th>Gebruikers</th><th>Status</th><th></th>
        </tr></thead>
        <tbody>
          ${tenants.map(t=>`
            <tr>
              <td><div class="tenant-name">${t.name}</div><div class="tenant-slug">${t.slug}</div></td>
              <td><div class="product-pills">${(t.products||[]).map(p=>`<span class="product-pill">${p.name}</span>`).join('')}</div></td>
              <td>${t.total_sessions}</td>
              <td>${t.unique_users}</td>
              <td><span class="${t.active?'badge-active':'badge-inactive'}">${t.active?'Actief':'Inactief'}</span></td>
              <td><button class="btn-detail" onclick="loadTenantDetail('${t.slug}')">Detail →</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── Klanten lijst ──
async function loadTenants() {
  const el = document.getElementById('tenants-content');
  el.innerHTML='<div class="loading">Laden...</div>';
  const d = await api('/api/dashboard/stats');
  const tenants = d.tenants||[];
  if (!tenants.length) { el.innerHTML='<div class="empty">Nog geen klanten.</div>'; return; }
  el.innerHTML=`
    <table class="tenant-table">
      <thead><tr>
        <th>Klant</th><th>Producten</th><th>Sessies</th><th>Laatste sessie</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>
        ${tenants.map(t=>`
          <tr>
            <td><div class="tenant-name">${t.name}</div><div class="tenant-slug">${t.slug}</div></td>
            <td><div class="product-pills">${(t.products||[]).map(p=>`<span class="product-pill">${p.name}</span>`).join('')}</div></td>
            <td>${t.total_sessions}</td>
            <td>${t.last_session?new Date(t.last_session).toLocaleDateString('nl-NL'):'—'}</td>
            <td><span class="${t.active?'badge-active':'badge-inactive'}">${t.active?'Actief':'Inactief'}</span></td>
            <td><button class="btn-detail" onclick="loadTenantDetail('${t.slug}')">Detail →</button></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Tenant detail met product-tabs ──
async function loadTenantDetail(slug, productSlug) {
  currentTenantSlug = slug;
  showView('tenant-detail');
  document.getElementById('detail-title').innerHTML='Klant <span>Detail</span>';
  document.getElementById('detail-content').innerHTML='<div class="loading">Laden...</div>';

  const qProduct = productSlug ? `&product=${productSlug}` : '';
  const d = await api(`/api/dashboard/stats?tenant=${slug}${qProduct}`);
  const s = d.stats||{};
  currentProductSlug = productSlug || (d.products?.[0]?.slug || 'zetjes');

  document.getElementById('detail-title').innerHTML=`${d.tenant?.name||slug} <span>Detail</span>`;

  // Product tabs (alleen tonen als er >1 product is)
  const products = d.products||[];
  const tabsHtml = products.length > 1 ? `
    <div class="tabs" style="margin-bottom:20px">
      ${products.map(p=>`
        <button class="tab ${p.slug===currentProductSlug?'active':''}"
          onclick="loadTenantDetail('${slug}','${p.slug}')">
          ${p.name}
        </button>`).join('')}
    </div>` : '';

  // Feedback chart data
  const fb = d.feedback||{};
  const fbColors = ['#1E7B55','#F59E0B','#CC0066','#D1D5DB'];
  const fbLabels = ['Ja, top!','Een beetje','Niet echt','Overgeslagen'];
  const fbValues = [fb.ja||0, fb.beetje||0, fb.nee||0, fb.skip||0];

  // Weekly data
  const weekly = d.weekly||[];
  const weekLabels = weekly.map(w=>w.week.replace(/.*-W/,'W'));
  const weekSessions = weekly.map(w=>w.sessions);

  // Blockers
  const blockers = d.blockers||[];
  const maxB = blockers[0]?.count||1;
  const blockerHTML = blockers.length
    ? blockers.slice(0,8).map(b=>`
        <div class="blocker-item">
          <div class="blocker-label">${b.type}</div>
          <div class="blocker-bar-wrap"><div class="blocker-bar" style="width:${Math.round(b.count/maxB*100)}%"></div></div>
          <div class="blocker-count">${b.count}</div>
        </div>`).join('')
    : '<div class="empty">Nog geen data</div>';

  const eff = s.effect_score!==null ? s.effect_score+'%' : '–';

  document.getElementById('detail-content').innerHTML=`
    ${tabsHtml}
    <div class="kpi-grid">
      <div class="kpi-card highlight">
        <div class="kpi-label">Effectiviteitsscore</div>
        <div class="kpi-value">${eff}</div>
        <div class="kpi-sub">Zetjes die werkten</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Sessies</div>
        <div class="kpi-value">${s.total_sessions}</div>
        <div class="kpi-sub">Zetjes gegeven</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Gebruikers</div>
        <div class="kpi-value">${s.unique_users}</div>
        <div class="kpi-sub">Gem. ${s.avg_sessions_per_user}x</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Links actief</div>
        <div class="kpi-value">${s.used_invites}<span style="font-size:18px;color:var(--text-soft)">/${s.total_invites}</span></div>
        <div class="kpi-sub">geactiveerd</div>
      </div>
    </div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Sessies per week (laatste 12 weken)</div>
        <div class="chart-wrap"><canvas id="weekly-chart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Feedback verdeling</div>
        <div class="chart-wrap" style="height:180px"><canvas id="fb-chart"></canvas></div>
        <div class="fb-legend">
          ${fbLabels.map((l,i)=>`<div class="fb-legend-item"><div class="fb-dot" style="background:${fbColors[i]}"></div>${l}: <strong>${fbValues[i]}</strong></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Meest voorkomende blokkades (intern)</div>
      <div class="blocker-list" style="margin-top:4px">${blockerHTML}</div>
      <p style="font-size:11px;color:var(--text-soft);margin-top:12px">
        ⚠️ Intern gebruik — nooit tonen aan medewerkers of opdrachtgevers
      </p>
    </div>`;

  setTimeout(()=>{
    if (charts.weekly) charts.weekly.destroy();
    charts.weekly = new Chart(document.getElementById('weekly-chart'),{
      type:'bar',
      data:{labels:weekLabels,datasets:[{label:'Sessies',data:weekSessions,
        backgroundColor:'rgba(204,0,102,.15)',borderColor:'#CC0066',
        borderWidth:2,borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(0,0,0,.05)'}},
          x:{grid:{display:false},ticks:{font:{size:11}}}}}
    });
    if (charts.fb) charts.fb.destroy();
    charts.fb = new Chart(document.getElementById('fb-chart'),{
      type:'doughnut',
      data:{labels:fbLabels,datasets:[{data:fbValues,backgroundColor:fbColors,borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false}}}
    });
  },50);
}

// ── Nieuwe klant ──
function renderProductCheckboxes() {
  const el = document.getElementById('product-checkboxes');
  el.innerHTML = allProducts.map(p=>`
    <label class="product-cb ${p.slug==='zetjes'?'checked':''}">
      <input type="checkbox" value="${p.slug}" ${p.slug==='zetjes'?'checked':''}>
      ${p.name}
    </label>`).join('');
  el.querySelectorAll('label').forEach(lbl=>{
    lbl.addEventListener('click',()=>{
      const cb = lbl.querySelector('input');
      setTimeout(()=>lbl.classList.toggle('checked',cb.checked),0);
    });
  });
}

function autoSlug() {
  const name = document.getElementById('new-name').value;
  document.getElementById('new-slug').value = name.toLowerCase()
    .replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').slice(0,40);
}

async function createTenant() {
  const name  = document.getElementById('new-name').value.trim();
  const slug  = document.getElementById('new-slug').value.trim();
  const count = parseInt(document.getElementById('new-count').value)||10;
  const products = [...document.querySelectorAll('#product-checkboxes input:checked')].map(i=>i.value);
  if (!name||!slug) { alert('Naam en slug zijn verplicht'); return; }
  if (!products.length) { alert('Kies minimaal één product'); return; }

  const r = await fetch(API+'/api/dashboard/tenants',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-admin-key':ADMIN_KEY},
    body:JSON.stringify({name,slug,products,inviteCount:count})
  });
  const d = await r.json();
  if (d.error) { alert('Fout: '+d.error); return; }

  // Toon links per product
  const sec = document.getElementById('links-section');
  sec.style.display='block';
  sec.innerHTML = Object.entries(d.links).map(([pSlug,links])=>`
    <div class="links-product-title">${pSlug.charAt(0).toUpperCase()+pSlug.slice(1)} — ${links.length} links</div>
    <div class="links-box" id="box-${pSlug}">${links.join('\n')}</div>
    <button class="copy-btn" onclick="copyLinks('${pSlug}')">📋 Kopieer ${pSlug} links</button>
  `).join('');
}

function copyLinks(pSlug) {
  navigator.clipboard.writeText(document.getElementById('box-'+pSlug).textContent);
}

async function downloadPDF() {
  if (!currentTenantSlug) return;
  const btn = document.getElementById('pdf-btn');
  btn.disabled=true; btn.textContent='⏳ Genereren...';
  try {
    const r = await fetch(`${API}/api/dashboard/report?tenant=${currentTenantSlug}`,
      {headers:{'x-admin-key':ADMIN_KEY}});
    if (!r.ok) { alert('Fout bij genereren'); return; }
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`happly-rapport-${currentTenantSlug}-${new Date().toISOString().slice(0,10)}.pdf`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { alert('Download mislukt'); }
  finally { btn.disabled=false; btn.textContent='⬇ Download rapport PDF'; }
}
